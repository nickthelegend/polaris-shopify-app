api_version = "2024-01"

[[extensions]]
type = "payments_extension"
name = "polaris-checkout-extension"
handle = "polaris-checkout-extension"

# Offsite Payment Extension Configuration
payment_session_url = "https://your-ngrok-app.ngrok.io/api/payment-session"
refund_session_url = "https://your-ngrok-app.ngrok.io/api/refund-session"
capture_session_url = "https://your-ngrok-app.ngrok.io/api/capture-session"
void_session_url = "https://your-ngrok-app.ngrok.io/api/void-session"

merchant_label = "Pay with Polaris Protocol"
supported_countries = ["US", "CA", "GB", "AU", "DE", "FR", "IN"]
supported_payment_methods = ["visa", "mastercard"]
supports_3ds = false
supports_installments = false
supports_deferred_payments = false
test_mode_available = true

[[extensions.targeting]]
target = "payments.offsite.render"

[[extensions.settings]]
key = "payment_gateway_name"
type = "single_line_text_field"
name = "Payment Gateway Name"
description = "Display name for the Polaris payment method"
default_value = "Pay with Polaris Protocol"

[[extensions.settings]]
key = "api_key"
type = "single_line_text_field"
name = "Polaris API Key"
description = "Your PayEase API Public Key"

[[extensions.settings]]
key = "api_secret"
type = "single_line_text_field"
name = "Polaris API Secret"
description = "Your PayEase API Secret Key"
